<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Report{% endblock %}</title>
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="{% block og_title %}{{ self.title() }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Ad creative optimization report{% endblock %}">
    <meta property="og:type" content="article">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="color-scheme" content="light">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Kleiber design tokens — mirror of frontend/src/styles/globals.css */
            --bg: #faf9f7;
            --bg-secondary: #f6f5f3;
            --bg-inverse: #1a1816;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border: #e8e5e0;
            --border-strong: #d4cfc5;
            --accent: #1a1816;
            --accent-hover: #2a2620;
            --accent-fg: #ffffff;
            --green: #059669;
            --red: #dc2626;
            --amber: #d97706;
            --font-stack: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-serif: 'DM Serif Display', Georgia, serif;
            --font-mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            --radius: 10px;
            --radius-lg: 16px;
            --radius-pill: 9999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-stack);
            color: var(--text);
            background: var(--bg);
            font-size: 16px;
            font-weight: 400;
            line-height: 1.6;
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        h1 { font-family: var(--font-serif); font-size: 24px; font-weight: 400; letter-spacing: -0.01em; }
        h2 { font-family: var(--font-serif); font-size: 18px; font-weight: 400; letter-spacing: -0.01em; margin-bottom: 12px; }
        h3 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-tertiary);
        }

        .section { margin-bottom: 2rem; }

        /* Report header */
        .report-header { margin-bottom: 2rem; }
        .report-meta {
            display: flex; gap: 12px; align-items: center;
            margin-bottom: 4px;
        }
        .report-type {
            background: var(--accent); color: var(--accent-fg);
            padding: 2px 10px; border-radius: var(--radius-pill);
            font-size: 11px; font-weight: 500;
        }
        .cycle-info { font-size: 13px; color: var(--text-tertiary); margin-top: 4px; }

        /* Top-line metric cards */
        .metric-cards {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; margin-bottom: 2rem;
        }
        @media (max-width: 600px) {
            .metric-cards { grid-template-columns: repeat(2, 1fr); }
        }
        .mc {
            background: var(--bg-secondary); border-radius: var(--radius);
            padding: 12px 14px;
        }
        .mc-label {
            font-size: 11px; color: var(--text-tertiary);
        }
        .mc-value { font-size: 20px; font-weight: 500; }
        .mc-trend { font-size: 11px; }
        .mc-trend-up { color: var(--green); }
        .mc-trend-down { color: var(--red); }
        .mc-trend-flat { color: var(--text-tertiary); }

        /* Spotlight card */
        .spotlight {
            border: 0.5px solid var(--border); border-radius: var(--radius-lg);
            padding: 1.25rem; margin-bottom: 2rem;
        }
        .spotlight-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .spotlight-header-title { font-size: 16px; font-weight: 500; }
        .spotlight-badge {
            background: #d1fae5; color: #047857;
            padding: 3px 10px; border-radius: var(--radius-pill);
            font-size: 11px; font-weight: 500;
        }
        .spotlight-hypothesis {
            font-size: 12px; color: var(--text-secondary);
            font-style: italic; line-height: 1.5; margin-bottom: 14px;
        }
        .spotlight-tiles {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; margin-bottom: 14px;
        }
        @media (max-width: 500px) {
            .spotlight-tiles { grid-template-columns: repeat(2, 1fr); }
        }
        .tile {
            background: var(--bg-secondary); border-radius: var(--radius);
            padding: 10px 12px;
        }
        .tile-label {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 0.3px; color: var(--text-tertiary);
        }
        .tile-value { font-size: 16px; font-weight: 500; }
        .tile-benchmark { font-size: 10px; color: var(--text-tertiary); }

        /* Funnel visualization */
        .funnel-step {
            display: flex; align-items: center; margin-bottom: 1px;
        }
        .funnel-label {
            width: 90px; text-align: right; padding-right: 10px;
            font-size: 12px; color: var(--text-secondary); flex-shrink: 0;
        }
        .funnel-bar {
            height: 28px; border-radius: 4px; color: white;
            font-size: 11px; font-weight: 500; padding: 0 10px;
            display: flex; align-items: center; min-width: 30px;
        }
        .funnel-val {
            font-size: 11px; color: var(--text-tertiary); margin-left: 8px;
            white-space: nowrap;
        }
        .funnel-dropoff {
            font-size: 10px; color: var(--text-tertiary);
            text-align: center; margin: 1px 0 1px 100px;
        }

        /* Diagnostics box */
        .diagnostics {
            background: var(--bg-secondary); border-radius: var(--radius);
            padding: 12px 14px; margin-top: 14px;
        }
        .diag-title { font-size: 12px; font-weight: 500; margin-bottom: 6px; }
        .diag-line { font-size: 12px; line-height: 1.6; padding: 2px 0; }
        .diag-good { color: var(--green); }
        .diag-warning { color: var(--amber); }
        .diag-bad { color: var(--red); }
        .diag-projection { color: var(--text-secondary); margin-top: 6px; font-size: 12px; }

        /* Creative DNA pills */
        .genome-pills { margin-top: 14px; }
        .pill {
            display: inline-flex; align-items: center; gap: 4px;
            background: var(--bg-secondary); border-radius: var(--radius);
            padding: 3px 10px; margin: 0 4px 4px 0; font-size: 11px;
        }
        .pill-slot { color: var(--text-tertiary); }
        .pill-value { color: var(--text); font-weight: 500; }

        /* Variant table */
        .variant-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .variant-table th {
            text-align: left; font-weight: 500; font-size: 10px;
            text-transform: uppercase; letter-spacing: 0.4px;
            color: var(--text-tertiary); padding: 8px;
            border-bottom: 0.5px solid var(--border);
        }
        .variant-table td {
            padding: 8px; border-bottom: 0.5px solid var(--border);
        }
        .variant-table .mono { font-family: var(--font-mono); font-size: 11px; }

        /* Status pills */
        .status-pill {
            display: inline-block; padding: 1px 8px; border-radius: var(--radius-pill);
            font-size: 10px; font-weight: 500;
        }
        .status-winner { background: #d1fae5; color: #047857; }
        .status-steady { background: #f4f3f0; color: #1a1a1a; }
        .status-new { background: #e0e7ff; color: #3730a3; }
        .status-fatigue { background: #fef3c7; color: #92400e; }
        .status-paused { background: #fef3c7; color: #92400e; }

        /* Alert rows */
        .alert-row {
            display: flex; gap: 10px; padding: 10px;
            background: #fef3c7; border-radius: var(--radius);
            margin-bottom: 6px; font-size: 13px;
        }

        /* Action rows */
        .action-row {
            display: flex; gap: 10px; padding: 8px 0; font-size: 13px;
            align-items: center;
        }
        .action-badge {
            padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 500;
        }
        .action-launch { background: #d1fae5; color: #047857; }
        .action-pause { background: #fef3c7; color: #92400e; }
        .action-increase_budget { background: #e0e7ff; color: #3730a3; }
        .action-decrease_budget { background: #fee2e2; color: #991b1b; }
        .action-promote_winner { background: #f4f3f0; color: #1a1a1a; }

        /* Footer */
        .report-footer {
            margin-top: 3rem; padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 12px; color: var(--text-tertiary);
        }
        .report-footer a { color: var(--accent); }

        /* Tweet snapshot region */
        .tweet-snapshot {
            padding: 20px; border-radius: var(--radius);
            background: var(--bg-secondary); margin-bottom: 2rem;
        }
        .snapshot-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; color: var(--text-secondary); margin-bottom: 12px;
        }
        .snapshot-metrics {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; margin-bottom: 16px;
        }
        .sm-label { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; }
        .sm-value { font-size: 16px; font-weight: 500; }
        .snapshot-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .snapshot-table th {
            text-align: left; font-weight: 500; font-size: 10px;
            text-transform: uppercase; color: var(--text-tertiary);
            padding: 4px 8px; border-bottom: 1px solid var(--border);
        }
        .snapshot-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }

        /* Share on X */
        .share-section { margin-top: 2rem; }
        .tweet-preview {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px; font-size: 14px;
            white-space: pre-line; line-height: 1.5; margin-bottom: 10px;
            font-family: var(--font-stack);
        }
        .copy-btn {
            background: var(--accent); color: var(--accent-fg); border: none;
            padding: 8px 18px; border-radius: var(--radius-pill); font-size: 13px;
            font-weight: 500; cursor: pointer;
        }
        .copy-btn:hover { background: var(--accent-hover); }
        .copy-btn:hover { opacity: 0.9; }
        .copy-feedback { font-size: 13px; color: var(--green); margin-left: 10px; }

        /* Index page */
        .report-list { list-style: none; }
        .report-list li {
            padding: 10px 0; border-bottom: 1px solid var(--border);
        }
        .report-list a {
            color: var(--accent); text-decoration: none; font-weight: 500;
        }
        .report-list a:hover { text-decoration: underline; }
        .report-list .date { font-family: var(--font-mono); font-size: 13px; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
