<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ad Creative Agent — Reports</title>
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="Ad Creative Agent — Reports">
    <meta property="og:description" content="Ad creative optimization report">
    <meta property="og:type" content="article">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f7f7f8;
            --text: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-tertiary: #999;
            --border: #e5e5e5;
            --accent: #534AB7;
            --green: #1D9E75;
            --red: #D85A30;
            --orange: #E09533;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --mono: "SF Mono", "Fira Code", monospace;
            --radius: 8px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #161616;
                --bg-secondary: #222;
                --text: #e5e5e5;
                --text-secondary: #999;
                --text-tertiary: #666;
                --border: #333;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        .report-header { margin-bottom: 2rem; }
        .report-meta {
            display: flex; gap: 12px; align-items: center;
            font-size: 14px; color: var(--text-secondary); margin-bottom: 4px;
        }
        .report-type {
            background: var(--accent); color: white;
            padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500;
        }
        h1 { font-size: 24px; font-weight: 600; line-height: 1.3; }
        .cycle-info { font-size: 13px; color: var(--text-tertiary); margin-top: 4px; }
        h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        h3 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .section { margin-bottom: 2rem; }
        .section-note { font-size: 12px; color: var(--text-tertiary); margin: -8px 0 12px; }

        /* Metric cards */
        .metric-cards {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 2rem;
        }
        @media (max-width: 600px) {
            .metric-cards { grid-template-columns: repeat(2, 1fr); }
        }
        .mc {
            background: var(--bg-secondary); border-radius: var(--radius);
            padding: 14px 16px;
        }
        .mc-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .mc-value { font-size: 20px; font-weight: 600; line-height: 1.3; }

        /* Hook rate bars */
        .hook-row {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 0; font-size: 13px;
        }
        .hook-row .variant-code {
            width: 50px; font-family: var(--mono); font-size: 12px; flex-shrink: 0;
        }
        .bar-container {
            flex: 1; height: 8px; background: var(--bg-secondary);
            border-radius: 4px; overflow: hidden;
        }
        .bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
        .hook-value { width: 50px; text-align: right; font-family: var(--mono); font-size: 12px; }
        .low-hook .bar { background: var(--red); }
        .low-hook .hook-value { color: var(--red); }
        .flag {
            font-size: 11px; color: var(--red); background: #FDE8E1;
            padding: 1px 6px; border-radius: 4px;
        }

        /* Funnel */
        .funnel-stage {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0; border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .funnel-stage:last-child { border-bottom: none; }
        .funnel-name { width: 140px; font-weight: 500; }
        .funnel-value { width: 80px; font-family: var(--mono); font-size: 12px; text-align: right; }
        .funnel-rate { width: 60px; font-family: var(--mono); font-size: 12px; text-align: right; color: var(--text-secondary); }
        .funnel-bar-container { flex: 1; height: 6px; background: var(--bg-secondary); border-radius: 3px; overflow: hidden; }
        .funnel-bar { height: 100%; background: var(--accent); border-radius: 3px; }
        .funnel-cost { width: 70px; font-family: var(--mono); font-size: 11px; text-align: right; color: var(--text-tertiary); }

        /* Leaderboard table */
        .leaderboard { width: 100%; border-collapse: collapse; font-size: 13px; }
        .leaderboard th {
            text-align: left; font-weight: 500; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-tertiary); padding: 8px 10px;
            border-bottom: 1px solid var(--border);
        }
        .leaderboard td { padding: 10px; border-bottom: 1px solid var(--border); }
        .leaderboard .mono { font-family: var(--mono); font-size: 12px; }
        .leaderboard tr:hover { background: var(--bg-secondary); }

        /* Status pills */
        .status { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
        .status-active { background: #EAF3DE; color: #27500A; }
        .status-winner { background: #EEEDFE; color: #3C3489; }
        .status-paused { background: #FAEEDA; color: #633806; }

        /* Dual ranking */
        .dual-ranking { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .dual-ranking { grid-template-columns: 1fr; } }
        .ranking-subtitle { font-size: 12px; color: var(--text-tertiary); margin-bottom: 8px; }
        .element-row {
            display: flex; gap: 8px; align-items: center;
            padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--border);
        }
        .element-row:last-child { border-bottom: none; }
        .rank { width: 28px; color: var(--text-tertiary); font-size: 12px; }
        .slot { font-weight: 500; width: 90px; font-size: 12px; }
        .value-label { flex: 1; color: var(--text-secondary); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .metric { font-family: var(--mono); font-size: 12px; }

        /* Interactions */
        .interaction-row {
            display: flex; gap: 10px; padding: 8px 0; font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        .interaction-row:last-child { border-bottom: none; }
        .interaction-pair { flex: 1; }
        .interaction-lift { font-family: var(--mono); font-size: 12px; font-weight: 600; }
        .lift-positive { color: var(--green); }
        .lift-negative { color: var(--red); }

        /* Empty state */
        .empty-state { font-size: 13px; color: var(--text-tertiary); font-style: italic; }

        /* Footer */
        .report-footer {
            margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border);
            font-size: 12px; color: var(--text-tertiary);
        }
        .report-footer a { color: var(--accent); }

        /* Tweet snapshot region */
        .tweet-snapshot {
            padding: 20px; border-radius: var(--radius);
            background: var(--bg-secondary); margin-bottom: 2rem;
        }
        .snapshot-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;
        }
        .snapshot-metrics {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px;
        }
        .sm-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; }
        .sm-value { font-size: 18px; font-weight: 600; }
        .snapshot-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .snapshot-table th {
            text-align: left; font-weight: 500; font-size: 10px;
            text-transform: uppercase; color: var(--text-tertiary);
            padding: 4px 8px; border-bottom: 1px solid var(--border);
        }
        .snapshot-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }

        /* Index page */
        .report-list { list-style: none; }
        .report-list li {
            padding: 10px 0; border-bottom: 1px solid var(--border);
        }
        .report-list a {
            color: var(--accent); text-decoration: none; font-weight: 500;
        }
        .report-list a:hover { text-decoration: underline; }
        .report-list .date { font-family: var(--mono); font-size: 13px; }
    </style>
</head>
<body>
    
<header class="report-header">
    <h1>Ad Creative Agent</h1>
    <p class="cycle-info">Performance reports archive</p>
</header>


<section class="section">
    <h2>Daily Reports</h2>
    <ul class="report-list">
        
        <li>
            <a href="https://esargent01.github.io/ad-analyzing-agent/daily/2026-04-07.html" class="date">2026-04-07</a>
        </li>
        
        <li>

        </li>
        
    </ul>
</section>






<footer class="report-footer">
    <p>Generated by Ad Creative Agent</p>
</footer>

</body>
</html>
