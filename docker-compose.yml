version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: adagent
      POSTGRES_PASSWORD: adagent_dev
      POSTGRES_DB: adagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  test-db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: adagent
      POSTGRES_PASSWORD: adagent_dev
      POSTGRES_DB: adagent_test
    ports:
      - "5433:5432"

  app:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://adagent:adagent_dev@db:5432/adagent

volumes:
  pgdata:
