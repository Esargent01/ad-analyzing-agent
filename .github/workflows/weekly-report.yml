name: Weekly Ad Report

on:
  schedule:
    - cron: '0 14 * * 1'  # 9am CT (UTC-5) every Monday
  workflow_dispatch:       # manual trigger via GitHub UI

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Import latest metrics from Meta
        run: python -m src.main import-meta-ads --campaign-id aa068b5d-19ec-4e48-95aa-7dc8a1764ae2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}

      - name: Generate weekly HTML report
        run: python -m src.main weekly-report --campaign-id aa068b5d-19ec-4e48-95aa-7dc8a1764ae2 --no-send-email
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Commit and push HTML reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --cached --quiet && echo "No new reports to commit" && exit 0
          git commit -m "Add weekly report $(date -u +%Y-%m-%d)"
          git push
