name: Weekly user generation

# Phase H: Monday morning cron. Runs the weekly variant generation
# pass across every active, user-owned campaign (via
# send-weekly-reports, which calls run_weekly_generation inline
# before rendering each owner's email) and sends a per-owner weekly
# report. The approval digest piggybacks so owners who haven't
# opened the dashboard since Friday get nudged too.

on:
  schedule:
    - cron: '0 12 * * 1'  # 7am CT (UTC-5) every Monday
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run weekly generation + send per-owner weekly reports
        run: python -m src.main send-weekly-reports
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_TOKEN_ENCRYPTION_KEY: ${{ secrets.META_TOKEN_ENCRYPTION_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          REPORT_BASE_URL: ${{ secrets.REPORT_BASE_URL }}

      - name: Send approval digest after weekly generation
        if: always()
        run: python -m src.main send-approval-digests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}

      - name: Commit and push HTML reports
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ || true
          if git diff --cached --quiet; then
            echo "No new reports to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Add weekly report $(date -u +%Y-%m-%d)"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.has_changes == 'true'
        run: gh workflow run deploy-reports.yml
        env:
          GH_TOKEN: ${{ github.token }}
