name: Daily Ad Report

on:
  schedule:
    - cron: '0 12 * * *'  # 7am CT (UTC-5) every day
  workflow_dispatch:       # manual trigger via GitHub UI

permissions:
  contents: write
  actions: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          playwright install chromium --with-deps

      - name: Import latest metrics from Meta
        run: python -m src.main import-meta-ads --campaign-id aa068b5d-19ec-4e48-95aa-7dc8a1764ae2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}

      - name: Generate daily HTML report and snapshot
        run: python -m src.main daily-report --campaign-id aa068b5d-19ec-4e48-95aa-7dc8a1764ae2 --no-send-email
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}

      - name: Commit and push HTML reports
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          if git diff --cached --quiet; then
            echo "No new reports to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Add daily report $(date -u +%Y-%m-%d)"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.has_changes == 'true'
        run: gh workflow run deploy-reports.yml
        env:
          GH_TOKEN: ${{ github.token }}
