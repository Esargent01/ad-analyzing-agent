name: Daily user cycles

# Phase H: the daily cron now fans out across every active,
# user-owned campaign rather than a single hardcoded UUID. The
# orchestrator runs propose-only — it observes Meta metrics, runs
# significance tests, and queues pause/scale proposals into
# approval_queue. No Meta mutations fire without a user click on
# the dashboard.
#
# Order of steps is intentional:
#   1. run-all-user-campaigns — refresh metrics + write proposals
#   2. send-daily-reports    — per-owner daily email summary
#   3. send-approval-digests — nudge owners with pending approvals
#      (runs regardless of whether a cycle ran — daily digest policy)

on:
  schedule:
    - cron: '0 12 * * *'  # 7am CT (UTC-5) every day
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run propose-only cycle for every user-owned campaign
        run: python -m src.main run-all-user-campaigns
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_TOKEN_ENCRYPTION_KEY: ${{ secrets.META_TOKEN_ENCRYPTION_KEY }}

      - name: Send per-owner daily report emails
        run: python -m src.main send-daily-reports
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          # KLEIBER-8: Without this the "Open full report" button in
          # every daily email pointed at localhost:5173 (the config
          # default). The repo-level secret is the source of truth and
          # must be set to ``https://agent.kleiber.ai``.
          FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}
          # The settled-metrics backfill polls Meta before rendering so
          # daily reports reflect yesterday's final numbers instead of
          # the partial-day snapshot from run-all-user-campaigns.
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_TOKEN_ENCRYPTION_KEY: ${{ secrets.META_TOKEN_ENCRYPTION_KEY }}

      - name: Send approval digest to every owner with pending items
        # Runs regardless of upstream failures — a failed cycle is
        # exactly the case where a nudge matters most.
        if: always()
        run: python -m src.main send-approval-digests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}

      - name: Commit and push HTML reports
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ || true
          if git diff --cached --quiet; then
            echo "No new reports to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Add daily report $(date -u +%Y-%m-%d)"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.has_changes == 'true'
        run: gh workflow run deploy-reports.yml
        env:
          GH_TOKEN: ${{ github.token }}
